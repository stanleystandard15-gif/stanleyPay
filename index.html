<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanley Pay</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
</head>

<body>

    <!-- app container -->
    <div class="container">
        <!-- top -->
        <div class="top">
            <!-- topLeft -->
            <div class="topLeft">
                <!-- profileImage -->
                <div class="profileImage"></div>
                <!-- profileText -->
                <div class="profileText">
                    <span>Stanley Ibe</span>
                </div>
            </div>

            <!-- topRight -->
            <div class="topRight">
                <!-- helpIcon -->
                <div class="helpIcon">
                    <i class="fa-regular fa-headphones"></i>
                </div>
                <!-- scanIcon -->
                <div class="scanIcon">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <!-- notificationIcon -->
                <div class="notificationIcon">
                    <i class="fa-regular fa-bell"></i>
                </div>

            </div>
        </div>

        <!-- middle -->
        <div class="middle">
            <div class="middleTop">

                <div class="balanceBoard">
                    <!-- up Balance Section -->
                    <div class="upBalSection">

                        <!--leftUpBal  -->
                        <div class="leftUpBal">
                            <i class="fa-solid fa-shield"></i>
                            <p>Available Balance</p>
                            <i class="fa-regular fa-eye-slash"></i>
                        </div>

                        <!--rightUpBal  -->
                        <div class="rightUpBal">
                            <p>Transaction History</p>
                            <div class="rightUpBalIcon">
                                <i class="fa-solid fa-greater-than"></i>
                            </div>
                        </div>
                    </div>


                    <!-- Down Balance Section -->
                    <div class="downBalSection">
                        <!--leftDownBal  -->
                        <div class="leftDownBal">
                            <p>****</p>
                            <div class="leftDownBalIcon">
                                <i class="fa-solid fa-greater-than"></i>
                            </div>
                        </div>

                        <!-- rightDownBal -->
                        <div class="rightDownBal">
                            <button>
                                <i class="fa-solid fa-plus"></i>
                                Add Money
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- middleSecondTop -->
            <div class="middleSecondTop">
                <div class="class">
                    <i class="fa-solid fa-circle-user"></i>
                </div>
                <div class="yam">
                    <i class="fa-solid fa-building-columns"></i>
                </div>
                <div class="beans">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                </div>

            </div>

            <!-- middleThirdTop -->
            <div class="middleThirdTop">
                <!-- upThirdTop -->
                <div class="upThirdTop">
                    <div class="stan">
                        <i class="fa-solid fa-signal"></i>
                    </div>
                    <div class="mum">
                        <i class="fa-solid fa-mobile-button"></i>
                    </div>
                    <div class="dad">
                        <i class="fa-solid fa-futbol"></i>
                    </div>
                    <div class="sis">
                        <i class="fa-solid fa-tv"></i>
                    </div>
                </div>
                <!-- downThirdTop -->
                <div class="downThirdTop">
                    <div class="boy">
                        <i class="fa-solid fa-sack-dollar"></i>
                    </div>
                    <div class="girl">
                        <i class="fa-solid fa-scale-balanced"></i>
                    </div>
                    <div class="man">
                        <i class="fa-solid fa-hands-holding-child"></i>
                    </div>
                    <div class="woman">
                        <i class="fa-solid fa-biohazard"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- footer -->
        <div class="footer">
            <div class="footerTop">
                <!-- homeIcon -->
                <div class="homeIcon">
                    <i class="fa-solid fa-piggy-bank"></i>
                </div>
                <!-- rewardsIcon -->
                <div class="rewardsIcon">
                    <i class="fa-regular fa-gem"></i>
                </div>
                <!-- financeIcon -->
                <div class="financeIcon">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <!-- cardsIcon -->
                <div class="cardsIcon">
                    <i class="fa-regular fa-credit-card"></i>
                </div>
                <!-- meIcon -->
                <div class="meIcon">
                    <i class="fa-regular fa-face-smile"></i>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
