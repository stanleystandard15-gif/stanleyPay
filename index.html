<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stanley Pay</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
</head>

<body>

    <!-- app container -->
    <div class="container">
        <!-- top -->
        <div class="top">
            <!-- topLeft -->
            <div class="topLeft">
                <!-- profileImage -->
                <div class="profileImage"></div>
                <!-- profileText -->
                <div class="profileText">
                    <span>Stanley Ibe</span>
                </div>
            </div>

            <!-- topRight -->
            <div class="topRight">
                <!-- helpIcon -->
                <div class="helpIcon">
                    <i class="fa-regular fa-headphones"></i>
                </div>
                <!-- scanIcon -->
                <div class="scanIcon">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <!-- notificationIcon -->
                <div class="notificationIcon">
                    <i class="fa-regular fa-bell"></i>
                </div>

            </div>
        </div>

        <!-- middle -->
        <div class="middle">
            <div class="middleTop">

                <div class="balanceBoard">
                    <!-- up Balance Section -->
                    <div class="upBalSection">

                        <!--leftUpBal  -->
                        <div class="leftUpBal">
                            <i class="fa-solid fa-shield"></i>
                            <p>Available Balance</p>
                            <i class="fa-regular fa-eye-slash"></i>
                        </div>

                        <!--rightUpBal  -->
                        <div class="rightUpBal">
                            <p>Transaction History</p>
                            <div class="rightUpBalIcon">
                            <i class="fa-solid fa-greater-than"></i>
                            </div>
                        </div>
                    </div>


                    <!-- Down Balance Section -->
                    <div class="downBalSection">
                        <!--leftDownBal  -->
                        <div class="leftDownBal">
                            <p>****</p>
                            <div class="leftDownBalIcon">
                                <i class="fa-solid fa-greater-than"></i>
                            </div>
                        </div>

                        <!-- rightDownBal -->
                        <div class="rightDownBal">
                            <button>
                                <i class="fa-solid fa-plus"></i>
                                Add Money
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- footer -->
        <div class="footer">
            <!-- homeBar -->
            <div class="homeBar"></div>
            <!-- rewardsBar -->
            <div class="rewardsBar"></div>


        </div>
    </div>







</body>

</html>
